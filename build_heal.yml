name: Build Endless, Beloved Heal APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Set up Gradle 8.7
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.7'
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
      - name: Extract project bundle
        env:
          BUNDLE_B64: 
        run: |
          echo "$BUNDLE_B64" | base64 -d > eb-heal-bundle.zip
          unzip -q eb-heal-bundle.zip
          cp -r eb-heal-bundle/css eb-heal-bundle/js eb-heal-bundle/data eb-heal-bundle/story eb-heal-bundle/art eb-heal-bundle/manifest.json eb-heal-bundle/index.html .
          cp -r eb-heal-bundle/android .
      - name: Copy web assets into Android assets
        run: |
          mkdir -p android/app/src/main/assets
          cp -r css js data story art manifest.json index.html android/app/src/main/assets/
      - name: Build release APK
        working-directory: android
        env:
          KEYSTORE_PATH:     ${{ github.workspace }}/android/app/keystore.jks
          KEYSTORE_PASSWORD: EBHeal2024!
          KEY_ALIAS:         endlessbelovedheeal
          KEY_PASSWORD:      EBHeal2024!
        run: gradle assembleRelease
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: EndlessBeloved-Heal-release
          path: android/app/build/outputs/apk/release/app-release.apk
